name: Create Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 0.5.0)"
        required: true
        type: string

concurrency:
  group: release

jobs:
  skip:
    name: Skipped
    if: github.ref_name != 'main'
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "This workflow only runs on the 'main' branch"
          exit 1

  prepare:
    name: Prepare
    if: github.ref_name == 'main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Validate version format
        run: |
          if [[ ! "${{ inputs.version }}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Version must be in semver format (e.g. 1.2.3)"
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Update version
        run: echo "${{ inputs.version }}" > VERSION

      - name: Update JSON versions
        run: |
          VERSION="${{ inputs.version }}"

          jq --arg v "$VERSION" '.metadata.version = $v' \
            .cursor-plugin/marketplace.json > tmp.json && mv tmp.json .cursor-plugin/marketplace.json

          for f in plugins/*/.cursor-plugin/plugin.json; do
            jq --arg v "$VERSION" '.version = $v' "$f" > tmp.json && mv tmp.json "$f"
          done

      - name: Create branch, commit, and open PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git checkout -b "release/v${{ inputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add VERSION .cursor-plugin/marketplace.json plugins/*/.cursor-plugin/plugin.json
          git commit -m "release: bump version to ${{ inputs.version }}"
          git push -u origin "release/v${{ inputs.version }}"
          gh pr create \
            --title "Release v${{ inputs.version }}" \
            --body "Bumps version to \`${{ inputs.version }}\`."
