[[services]]
id = "cache-service"
repo = "git@github.com:acme/platform.git"
project_dir = "."
crate = "cache-service"
domain = "platform"
capabilities = ["caching"]

[[services]]
id = "api-gateway"
repo = "git@github.com:acme/platform.git"
project_dir = "."
crate = "api-gateway"
domain = "platform"
capabilities = ["routing", "auth"]
