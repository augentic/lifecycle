# yaml-language-server: $schema=../schema.schema.json
name: omnia
version: 1
description: Omnia workflow

terminology:
  deliverable: crate

blueprints:
  - id: proposal
    generates: proposal.md
    description: Initial proposal document
    instructions: instructions/proposal.md
    requires: []
    validate:
      - Has a Why section with at least one sentence
      - Has a Source section identifying Repository, Epic, or Manual
      - Has a Crates section listing at least one new or modified crate
      - Crate names are kebab-case

  - id: specs
    generates: specs/**/*.md
    description: Detailed specifications for the change
    instructions: instructions/specs.md
    requires:
      - proposal
    validate:
      - Every requirement has at least one scenario
      - Every requirement includes a stable ID line immediately after the
        heading
      - Requirement IDs use the REQ-XXX format and stay stable when behavior is
        modified or renamed
      - Uses SHALL/MUST language for normative requirements (not should/may)
      - Requirements use the flat baseline format with top-level requirement 
        headings
      - Every scenario uses WHEN/THEN format

  - id: design
    generates: design.md
    description: Technical design document with implementation details
    instructions: instructions/design.md
    requires:
      - proposal
    validate:
      - Has a Context section
      - Has a Domain Model section (or explicitly states none needed)
      - Has a Business Logic section (or explicitly states none needed)

  - id: tasks
    generates: tasks.md
    description: Implementation checklist with trackable tasks
    instructions: instructions/tasks.md
    requires:
      - specs
      - design
    validate:
      - Every task uses checkbox format (- [ ] X.Y description)
      - Tasks are grouped under numbered headings
      - At least one task exists

validation:
  proposal-crates-have-specs: true
  design-references-valid: true
  spec-format-valid: true

build:
  requires: 
    - tasks
  tracks: tasks.md
  instructions: instructions/build.md

defaults:
  context: |
    Tech stack: Rust, WASM (wasm32-wasip2), Omnia SDK
    Architecture: Handler<P> pattern with provider trait bounds
    Testing: Rust integration tests, cargo test
  rules:
    proposal: |
      - Identify the proposal source. It will be either a git repository URL
        (for code analysis), a JIRA/ADO epic key (for requirements analysis), or
        a manual proposal (feature work).
      - Use crate names. For modified crates, use the existing spec folder name
        from .specify/specs/. For new crates, choose a name that will be the
        crate name
    specs: |
      - Use WHEN/THEN format for scenarios
      - Reference existing patterns before inventing new ones
      - Organize baseline specs as flat requirement blocks using
        ### Requirement: <name> plus ID: REQ-XXX and #### Scenario: <name>
        entries
      - Use an optional ## Purpose preamble plus optional ## Error Conditions
        and ## Metrics sections for shared context
      - For update changes use top-level ADDED/MODIFIED/REMOVED/RENAMED
        delta-operation sections keyed by stable requirement IDs
    design: |
      - Include Context section with Source field (jira-epic or source-code)
      - Document domain model entity/type definitions with field names, types,
        wire names, and optionality
      - Document API contracts with method, path, request/response shapes
      - Document business logic per handler as tagged pseudocode ([domain],
        [infrastructure], [mechanical]) with required provider traits per handler
      - Document external services name, type (API, managed table store, cache,
        message broker), authentication
      - Document configuration with all config keys, descriptions, and defaults
      - Include Source Capabilities Summary checklist (Config, HttpRequest,
        Publish, StateStore, Identity, TableStore, Broadcast)
      - Flag structural changes (type renames, handler splits/merges)
      - Use mermaid diagrams for entity relationships and flows
    tasks: |
      - For greenfields projects (no existing Cargo.toml), structure tasks around
        the create-mode skill chain: 1) guest-writer, 2) crate-writer,
        3) test-writer, 4) verify, 5) code-reviewer. Do not list individual
        Rust code changes — the skills handle file-level generation.
      - For brownfield projects (where there is an existing Cargo.toml), structure
        tasks around the specific behavioral changes from the specs. crate-writer
        handles code modifications and test-writer handles test updates.
