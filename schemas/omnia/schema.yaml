name: omnia
version: 1
description: Omnia workflow

spec_format:
  requirement_heading: "### Requirement:"
  scenario_heading: "#### Scenario:"
  delta_operations:
    added: "## ADDED Requirements"
    modified: "## MODIFIED Requirements"
    removed: "## REMOVED Requirements"
    renamed: "## RENAMED Requirements"

artifacts:
  - id: proposal
    generates: proposal.md
    description: Initial proposal document
    template: proposal.md
    instruction: instructions/proposal.md
    requires: []
    validate:
      - Has a Why section with at least one sentence
      - Has a Source section identifying Repository, Epic, or Manual
      - Has a Crates section listing at least one new or modified crate
      - Crate names are kebab-case

  - id: specs
    generates: specs/**/*.md
    description: Detailed specifications for the change
    templates:
      new: spec-new.md
      delta: spec-delta.md
    instruction: instructions/specs.md
    requires:
      - proposal
    validate:
      - Every requirement has at least one scenario
      - Uses SHALL/MUST language for normative requirements (not should/may)
      - Requirements use the flat baseline format with top-level requirement headings
      - Every scenario uses WHEN/THEN format

  - id: design
    generates: design.md
    description: Technical design document with implementation details
    template: design.md
    instruction: instructions/design.md
    requires:
      - proposal
    validate:
      - Has a Context section
      - Has a Domain Model section (or explicitly states none needed)
      - Has a Business Logic section (or explicitly states none needed)

  - id: tasks
    generates: tasks.md
    description: Implementation checklist with trackable tasks
    template: tasks.md
    instruction: instructions/tasks.md
    requires:
      - specs
      - design
    validate:
      - Every task uses checkbox format (- [ ] X.Y description)
      - Tasks are grouped under numbered headings
      - At least one task exists

apply:
  requires: [tasks]
  tracks: tasks.md
  instruction: instructions/apply.md
