name: realtime
version: 1
description: Realtime workflow
extends: https://github.com/augentic/specify/schemas/omnia

terminology:
  unit: crate

artifacts:
  - id: proposal
    generates: proposal.md
    description: Initial proposal document
    template: proposal.md
    instruction: instructions/proposal.md
    requires: []
    validate:
      - Has a Why section with at least one sentence
      - Has a Source section identifying Repository or Manual
      - Has a Crates section listing at least one new or modified crate
      - Crate names are kebab-case
    validate-checks:
      - check: heading-exists
        heading: "## Why"
        min-content-lines: 1
      - check: heading-exists
        heading: "## Source"
        content-matches: "Repository|Manual"
      - check: heading-exists
        heading: "## Crates"
        min-content-lines: 1
      - check: pattern-match
        scope: crate-names
        pattern: "^[a-z][a-z0-9]*(-[a-z0-9]+)*$"
